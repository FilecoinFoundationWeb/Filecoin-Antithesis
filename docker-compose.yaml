name: filecoin
x-templates:
  filecoin_service: &filecoin_service
    env_file: .env
    environment:
      - NUM_LOTUS_CLIENTS=${NUM_LOTUS_CLIENTS:-4}
      - NUM_LOTUS_MINERS=${NUM_LOTUS_MINERS:-4}
      - NUM_FOREST_CLIENTS=${NUM_FOREST_CLIENTS:-1}
      - SECTORS_PER_MINER=${SECTORS_PER_MINER:-4,3,2,1}
    volumes:
      - ./data/lotus0:${LOTUS_0_DATA_DIR}
      - ./data/lotus1:${LOTUS_1_DATA_DIR}
      - ./data/lotus2:${LOTUS_2_DATA_DIR}
      - ./data/lotus3:${LOTUS_3_DATA_DIR}
      - ./data/forest0:${FOREST_0_DATA_DIR}
      - ./shared/configs:${SHARED_CONFIGS}
      - ./data/curio:/var/lib/curio:rw
    pull_policy: never
  needs_drand0_started: &needs_drand0_started
    depends_on:
      drand0:
        condition: service_started
  needs_all_drand_healthy: &needs_all_drand_healthy
    depends_on:
      drand0:
        condition: service_healthy
      drand1:
        condition: service_healthy
      drand2:
        condition: service_healthy
  needs_lotus0_healthy: &needs_lotus0_healthy
    depends_on:
      lotus0:
        condition: service_healthy
  needs_lotus1_healthy: &needs_lotus1_healthy
    depends_on:
      lotus1:
        condition: service_healthy
  needs_lotus2_healthy: &needs_lotus2_healthy
    depends_on:
      lotus2:
        condition: service_healthy
  needs_lotus3_healthy: &needs_lotus3_healthy
    depends_on:
      lotus3:
        condition: service_healthy
  needs_filwizard_healthy: &needs_filwizard_healthy
    depends_on:
      filwizard:
        condition: service_healthy
  healthcheck_settings: &healthcheck_settings
    interval: 5s
    timeout: 2s
    retries: 10

services:
  drand0:
    <<: [ *filecoin_service ]
    container_name: drand0
    image: drand:latest
    entrypoint: ./start-drand0.sh
    volumes:
      - ./data/drand0:/root/.drand
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand0:8080

  drand1:
    <<: [ *filecoin_service, *needs_drand0_started ]
    container_name: drand1
    image: drand:latest
    entrypoint: ./start-drand1.sh
    volumes:
      - ./data/drand1:/root/.drand
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand1:8080

  drand2:
    <<: [ *filecoin_service, *needs_drand0_started ]
    container_name: drand2
    image: drand:latest
    entrypoint: ./start-drand2.sh
    volumes:
      - ./data/drand2:/root/.drand
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand2:8080

  lotus0:
    <<: [ *filecoin_service, *needs_all_drand_healthy ]
    container_name: lotus0
    image: lotus:${LOTUS_0_TAG:-${LOTUS_TAG:-latest}}
    entrypoint: [ "./scripts/start-lotus.sh", "0" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus0:1234/health/livez

  lotus1:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_1_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus1
    entrypoint: [ "./scripts/start-lotus.sh", "1" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus1:1234/health/livez

  lotus2:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_2_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus2
    entrypoint: [ "./scripts/start-lotus.sh", "2" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus2:1234/health/livez
    profiles: [ full ]

  lotus3:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_3_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus3
    entrypoint: [ "./scripts/start-lotus.sh", "3" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus3:1234/health/livez
    profiles: [ full ]

  forest0:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: forest:latest
    container_name: forest0
    entrypoint: [ "./scripts/start-forest.sh", "0" ]
    profiles: [ full ]

  workload:
    <<: [ *filecoin_service ]
    image: workload:latest
    container_name: workload
    environment:
      - STRESS_NODES=${STRESS_NODES:-lotus0,lotus1,lotus2,lotus3,forest0}
      - STRESS_RPC_PORT=1234
      - STRESS_FOREST_RPC_PORT=3456
      - STRESS_KEYSTORE_PATH=/shared/configs/stress_keystore.json
      - STRESS_WAIT_HEIGHT=10
      # --- Consensus / health-check vectors (always active in both profiles) ---
      # All STRESS_WEIGHT_* vars use ${VAR:-default} so profile .env files can override.
      - STRESS_WEIGHT_TIPSET_CONSENSUS=${STRESS_WEIGHT_TIPSET_CONSENSUS:-3}
      - STRESS_WEIGHT_HEIGHT_PROGRESSION=${STRESS_WEIGHT_HEIGHT_PROGRESSION:-2}
      - STRESS_WEIGHT_PEER_COUNT=${STRESS_WEIGHT_PEER_COUNT:-1}
      - STRESS_WEIGHT_HEAD_COMPARISON=${STRESS_WEIGHT_HEAD_COMPARISON:-3}
      - STRESS_WEIGHT_STATE_ROOT=${STRESS_WEIGHT_STATE_ROOT:-4}
      - STRESS_WEIGHT_STATE_AUDIT=${STRESS_WEIGHT_STATE_AUDIT:-3}
      - STRESS_WEIGHT_F3_MONITOR=${STRESS_WEIGHT_F3_MONITOR:-2}
      - STRESS_WEIGHT_F3_AGREEMENT=${STRESS_WEIGHT_F3_AGREEMENT:-3}
      - STRESS_WEIGHT_DRAND_BEACON_AUDIT=${STRESS_WEIGHT_DRAND_BEACON_AUDIT:-3}
      # Power / reorg
      - STRESS_WEIGHT_REORG=${STRESS_WEIGHT_REORG:-0}
      - STRESS_WEIGHT_POWER_SLASH=${STRESS_WEIGHT_POWER_SLASH:-2}
      # Quiet recovery: pauses all fault injection to verify chain self-healing (off by default)
      - QUIET_RECOVERY_ENABLED=${QUIET_RECOVERY_ENABLED:-0}
      - STRESS_WEIGHT_QUIET_RECOVERY=${STRESS_WEIGHT_QUIET_RECOVERY:-0}
      # Protocol fuzzer: 0=off, 1=on (fuzzer uses its own Go-code defaults for weights)
      - FUZZER_ENABLED=${FUZZER_ENABLED:-0}
      #
      # --- Consensus integration test (background lifecycle, not deck) ---
      - STRESS_CONSENSUS_TEST=${STRESS_CONSENSUS_TEST:-0}
      #
      # --- Non-FOC stress vectors ---
      #
      # EVM contract stress
      - STRESS_WEIGHT_DEPLOY=${STRESS_WEIGHT_DEPLOY:-1}
      - STRESS_WEIGHT_CONTRACT_CALL=${STRESS_WEIGHT_CONTRACT_CALL:-1}
      - STRESS_WEIGHT_SELFDESTRUCT=${STRESS_WEIGHT_SELFDESTRUCT:-0}
      - STRESS_WEIGHT_CONTRACT_RACE=${STRESS_WEIGHT_CONTRACT_RACE:-2}
      # Background chain activity
      - STRESS_WEIGHT_TRANSFER=${STRESS_WEIGHT_TRANSFER:-2}
      - STRESS_WEIGHT_GAS_WAR=${STRESS_WEIGHT_GAS_WAR:-1}
      - STRESS_WEIGHT_NONCE_RACE=${STRESS_WEIGHT_NONCE_RACE:-1}
      - STRESS_WEIGHT_HEAVY_COMPUTE=${STRESS_WEIGHT_HEAVY_COMPUTE:-1}
      # Resource stress
      - STRESS_WEIGHT_MAX_BLOCK_GAS=${STRESS_WEIGHT_MAX_BLOCK_GAS:-0}
      - STRESS_WEIGHT_LOG_BLASTER=${STRESS_WEIGHT_LOG_BLASTER:-0}
      - STRESS_WEIGHT_MEMORY_BOMB=${STRESS_WEIGHT_MEMORY_BOMB:-0}
      - STRESS_WEIGHT_STORAGE_SPAM=${STRESS_WEIGHT_STORAGE_SPAM:-0}
      # Nonce/ordering chaos
      - STRESS_WEIGHT_MSG_ORDERING=${STRESS_WEIGHT_MSG_ORDERING:-1}
      - STRESS_WEIGHT_NONCE_BOMBARD=${STRESS_WEIGHT_NONCE_BOMBARD:-0}
      - STRESS_WEIGHT_ADVERSARIAL=${STRESS_WEIGHT_ADVERSARIAL:-0}
      # Gas pressure
      - STRESS_WEIGHT_GAS_EXHAUST=${STRESS_WEIGHT_GAS_EXHAUST:-0}
      # Cross-node consistency
      - STRESS_WEIGHT_RECEIPT_AUDIT=${STRESS_WEIGHT_RECEIPT_AUDIT:-3}
      - STRESS_WEIGHT_ACTOR_MIGRATION=${STRESS_WEIGHT_ACTOR_MIGRATION:-1}
      - STRESS_WEIGHT_ACTOR_LIFECYCLE=${STRESS_WEIGHT_ACTOR_LIFECYCLE:-1}
      # --- FOC (Filecoin On-Chain Cloud) vectors ---
      # All FOC vectors require the `foc` compose profile to be active.
      # The lifecycle state machine must reach "Ready" before steady-state
      # vectors will fire. Higher weight = picked more often from the deck.
      #
      # SETUP: drives the sequential state machine one step per pick
      #   Init → Approved → Deposited → OperatorApproved → DataSetCreated → Ready
      - STRESS_WEIGHT_FOC_LIFECYCLE=${STRESS_WEIGHT_FOC_LIFECYCLE:-6}
      #
      # STEADY-STATE: only execute once lifecycle reaches Ready
      - STRESS_WEIGHT_FOC_UPLOAD=${STRESS_WEIGHT_FOC_UPLOAD:-4}
      - STRESS_WEIGHT_FOC_ADD_PIECES=${STRESS_WEIGHT_FOC_ADD_PIECES:-3}
      - STRESS_WEIGHT_FOC_MONITOR=${STRESS_WEIGHT_FOC_MONITOR:-4}
      - STRESS_WEIGHT_FOC_RETRIEVE=${STRESS_WEIGHT_FOC_RETRIEVE:-2}
      - STRESS_WEIGHT_FOC_TRANSFER=${STRESS_WEIGHT_FOC_TRANSFER:-2}
      - STRESS_WEIGHT_FOC_SETTLE=${STRESS_WEIGHT_FOC_SETTLE:-2}
      - STRESS_WEIGHT_FOC_WITHDRAW=${STRESS_WEIGHT_FOC_WITHDRAW:-2}
      #
      # DESTRUCTIVE: weight 0 = disabled by default, set >0 to opt-in
      - STRESS_WEIGHT_FOC_DELETE_PIECE=${STRESS_WEIGHT_FOC_DELETE_PIECE:-1}
      - STRESS_WEIGHT_FOC_DELETE_DS=${STRESS_WEIGHT_FOC_DELETE_DS:-0}
      #
      # TODO: STRESS_WEIGHT_PDP_GRIEFING — planned, no implementation yet
      #
      - CURIO_PDP_URL=http://curio:80
      - STRESS_DEBUG=${STRESS_DEBUG:-1}
    volumes:
      - ./shared/configs:/shared/configs
      - ./shared:/shared
      - ./data/lotus0:/root/devgen/lotus0
      - ./data/lotus1:/root/devgen/lotus1
      - ./data/lotus2:/root/devgen/lotus2
      - ./data/lotus3:/root/devgen/lotus3
      - ./data/forest0:/root/devgen/forest0
      - ./data/curio:/root/devgen/curio

  lotus-miner0:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_MINER_0_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner0
    entrypoint: [ "./scripts/start-lotus-miner.sh", "0" ]

  lotus-miner1:
    <<: [ *filecoin_service, *needs_lotus1_healthy ]
    image: lotus:${LOTUS_MINER_1_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner1
    entrypoint: [ "./scripts/start-lotus-miner.sh", "1" ]

  lotus-miner2:
    <<: [ *filecoin_service, *needs_lotus2_healthy ]
    image: lotus:${LOTUS_MINER_2_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner2
    entrypoint: [ "./scripts/start-lotus-miner.sh", "2" ]
    profiles: [ full ]

  lotus-miner3:
    <<: [ *filecoin_service, *needs_lotus3_healthy ]
    image: lotus:${LOTUS_MINER_3_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner3
    entrypoint: [ "./scripts/start-lotus-miner.sh", "3" ]
    profiles: [ full ]

  # ===========================================================================
  # foc profile: Filecoin On-Chain Cloud services (filwizard + yugabyte + curio)
  # Start with: docker compose --profile foc up -d
  # ===========================================================================

  # FilWizard: contract deployment + environment wiring
  filwizard:
    <<: [ *filecoin_service ]
    image: filwizard:latest
    container_name: filwizard
    entrypoint: [ "/filwizard-entrypoint.sh" ]
    volumes:
      - ./shared/configs:/shared/configs
      - ./data/lotus0:/shared/lotus0
      - ./data/curio:/shared/curio
      - ./shared:/shared
      - ./filwizard/entrypoint.sh:/filwizard-entrypoint.sh
    depends_on:
      lotus0:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-f", "/tmp/healthy" ]
      interval: 5s
      timeout: 2s
      retries: 120
    profiles: [ foc ]

  # Yugabyte Database Service
  yugabyte:
    <<: [ *filecoin_service ]
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte
    init: true
    command: >
      bash -lc '
        bin/yugabyted start --base_dir=/home/yugabyte/yb_data --background=true --ui=false
        tail -F \
          /home/yugabyte/yb_data/data/yb-data/tserver/logs/yb-tserver.INFO
      '
    ports:
      - "5433:5433"
      - "9042:9042"
      - "15433:15433"
    environment:
      - TINI_SUBREAPER=true
    volumes:
      - ./data/yugabyte:/home/yugabyte/yb_data
    profiles: [ foc ]

  # Curio service
  curio:
    <<: [ *filecoin_service ]
    image: curio:${CURIO_TAG:-latest}
    container_name: curio
    ports:
      - "4433:443"
      - "8080:80"
      - "12300:12300"
      - "4701:4701"
      - "32100:32100"
    depends_on:
      lotus0:
        condition: service_healthy
      yugabyte:
        condition: service_started
      filwizard:
        condition: service_started
    profiles: [ foc ]
