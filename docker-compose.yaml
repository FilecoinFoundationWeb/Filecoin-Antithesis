name: filecoin
x-templates:
  filecoin_service: &filecoin_service
    env_file: .env
    environment:
      - NUM_LOTUS_CLIENTS=4
      - NUM_LOTUS_MINERS=4
      - NUM_FOREST_CLIENTS=1
      - SECTORS_PER_MINER=${SECTORS_PER_MINER:-4,3,2,1}
    volumes:
      - ./data/lotus0:${LOTUS_0_DATA_DIR}
      - ./data/lotus1:${LOTUS_1_DATA_DIR}
      - ./data/lotus2:${LOTUS_2_DATA_DIR}
      - ./data/lotus3:${LOTUS_3_DATA_DIR}
      - ./data/forest0:${FOREST_0_DATA_DIR}
      - ./shared/configs:${SHARED_CONFIGS}
      - ./data/curio:/var/lib/curio:rw
    pull_policy: never
  needs_drand0_started: &needs_drand0_started
    depends_on:
      drand0:
        condition: service_started
  needs_all_drand_healthy: &needs_all_drand_healthy
    depends_on:
      drand0:
        condition: service_healthy
      drand1:
        condition: service_healthy
      drand2:
        condition: service_healthy
  needs_lotus0_healthy: &needs_lotus0_healthy
    depends_on:
      lotus0:
        condition: service_healthy
  needs_lotus1_healthy: &needs_lotus1_healthy
    depends_on:
      lotus1:
        condition: service_healthy
  needs_lotus2_healthy: &needs_lotus2_healthy
    depends_on:
      lotus2:
        condition: service_healthy
  needs_lotus3_healthy: &needs_lotus3_healthy
    depends_on:
      lotus3:
        condition: service_healthy
  needs_filwizard_healthy: &needs_filwizard_healthy
    depends_on:
      filwizard:
        condition: service_healthy
  healthcheck_settings: &healthcheck_settings
    interval: 5s
    timeout: 2s
    retries: 10

services:
  drand0:
    <<: [ *filecoin_service ]
    container_name: drand0
    image: drand:latest
    entrypoint: ./start-drand0.sh
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand0:8080

  drand1:
    <<: [ *filecoin_service, *needs_drand0_started ]
    container_name: drand1
    image: drand:latest
    entrypoint: ./start-drand1.sh
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand1:8080

  drand2:
    <<: [ *filecoin_service, *needs_drand0_started ]
    container_name: drand2
    image: drand:latest
    entrypoint: ./start-drand2.sh
    healthcheck:
      <<: *healthcheck_settings
      test: drand util ping http://drand2:8080

  lotus0:
    <<: [ *filecoin_service, *needs_all_drand_healthy ]
    container_name: lotus0
    image: lotus:${LOTUS_0_TAG:-${LOTUS_TAG:-latest}}
    entrypoint: [ "./scripts/start-lotus.sh", "0" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus0:1234/health/livez

  lotus1:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_1_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus1
    entrypoint: [ "./scripts/start-lotus.sh", "1" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus1:1234/health/livez

  lotus2:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_2_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus2
    entrypoint: [ "./scripts/start-lotus.sh", "2" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus2:1234/health/livez
    profiles: [ full ]

  lotus3:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_3_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus3
    entrypoint: [ "./scripts/start-lotus.sh", "3" ]
    healthcheck:
      <<: *healthcheck_settings
      test: curl --fail http://lotus3:1234/health/livez
    profiles: [ full ]

  forest0:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: forest:latest
    container_name: forest0
    entrypoint: [ "./scripts/start-forest.sh", "0" ]
    profiles: [ full ]

  workload:
    <<: [ *filecoin_service ]
    image: workload:latest
    container_name: workload
    environment:
      - STRESS_NODES=lotus0,lotus1,lotus2,lotus3
      - STRESS_RPC_PORT=1234
      - STRESS_FOREST_RPC_PORT=3456
      - STRESS_KEYSTORE_PATH=/shared/configs/stress_keystore.json
      - STRESS_WAIT_HEIGHT=10
      # --- Consensus / health-check vectors (always active in both profiles) ---
      - STRESS_WEIGHT_TIPSET_CONSENSUS=3 # cross-node tipset agreement (Sometimes)
      - STRESS_WEIGHT_HEIGHT_PROGRESSION=2 # chain height advances
      - STRESS_WEIGHT_PEER_COUNT=1 # node peer connectivity
      - STRESS_WEIGHT_HEAD_COMPARISON=3 # cross-node chain head match (Sometimes)
      - STRESS_WEIGHT_STATE_ROOT=4 # cross-node state root match (Sometimes)
      - STRESS_WEIGHT_STATE_AUDIT=3 # full state tree audit
      - STRESS_WEIGHT_F3_MONITOR=2 # passive F3 health monitor
      - STRESS_WEIGHT_F3_AGREEMENT=3 # cross-node F3 certificate consistency
      - STRESS_WEIGHT_REORG=0 # power-aware reorg testing (disabled — consensus lifecycle handles partitions)
      - STRESS_WEIGHT_POWER_SLASH=4 # power-aware miner slashing
      # - STRESS_WEIGHT_QUORUM_STALL=0  # deliberate F3 stall (opt-in, destructive)
      - FUZZER_ENABLED=0 # protocol fuzzer off for consensus threshold testing
      #
      # --- Consensus integration test (background lifecycle, not deck) ---
      - STRESS_CONSENSUS_TEST=1 # enable structured EC/F3 safety proof lifecycle
      #
      # --- Non-FOC stress vectors ---
      #
      # EVM contract stress
      - STRESS_WEIGHT_DEPLOY=1 # Init actor & state tree growth via EAM.CreateExternal
      - STRESS_WEIGHT_CONTRACT_CALL=1 # deep recursion, delegatecall, external recursive calls
      - STRESS_WEIGHT_SELFDESTRUCT=0 # actor destruction state consistency across nodes
      - STRESS_WEIGHT_CONTRACT_RACE=2 # conflicting txs to diff nodes — state divergence during forks
      # Background chain activity (deck — runs between test cycles)
      - STRESS_WEIGHT_TRANSFER=2 # FIL transfers (state changes for forks to reconcile)
      - STRESS_WEIGHT_GAS_WAR=1 # mempool replacement across forks
      - STRESS_WEIGHT_NONCE_RACE=1 # gas-premium race across different nodes
      - STRESS_WEIGHT_HEAVY_COMPUTE=1 # intra-node state recomputation verification
      # Resource stress (disabled)
      - STRESS_WEIGHT_MAX_BLOCK_GAS=0 # maxes out block gas
      - STRESS_WEIGHT_LOG_BLASTER=0 # receipt storage, bloom filters, event indexing
      - STRESS_WEIGHT_MEMORY_BOMB=0 # FVM memory accounting
      - STRESS_WEIGHT_STORAGE_SPAM=0 # state trie (HAMT), SplitStore
      # Nonce/ordering chaos
      - STRESS_WEIGHT_MSG_ORDERING=1 # cross-node message replacement/mempool ordering
      - STRESS_WEIGHT_NONCE_BOMBARD=0 # N+x gap handling & out-of-order execution
      - STRESS_WEIGHT_ADVERSARIAL=0 # double-spends (handled by consensus lifecycle)
      # Gas pressure (disabled)
      - STRESS_WEIGHT_GAS_EXHAUST=0 # high-gas call competing with small msgs
      # Cross-node consistency
      - STRESS_WEIGHT_RECEIPT_AUDIT=4 # asserts receipt fields match across every node
      - STRESS_WEIGHT_ACTOR_MIGRATION=1 # burst-creates & deletes actors, stresses HAMT during forks
      - STRESS_WEIGHT_ACTOR_LIFECYCLE=1 # full actor lifecycle
      # --- FOC (Filecoin On-Chain Cloud) vectors ---
      # All FOC vectors require the `foc` compose profile to be active.
      # The lifecycle state machine must reach "Ready" before steady-state
      # vectors will fire. Higher weight = picked more often from the deck.
      #
      # SETUP: drives the sequential state machine one step per pick
      #   Init → Approved → Deposited → OperatorApproved → DataSetCreated → Ready
      - STRESS_WEIGHT_FOC_LIFECYCLE=6
      #
      # STEADY-STATE: only execute once lifecycle reaches Ready
      - STRESS_WEIGHT_FOC_UPLOAD=4 # upload random data to Curio PDP API
      - STRESS_WEIGHT_FOC_ADD_PIECES=3 # add uploaded pieces to on-chain proofset
      - STRESS_WEIGHT_FOC_MONITOR=4 # query proofset health + USDFC balances
      - STRESS_WEIGHT_FOC_RETRIEVE=2 # download piece and verify CID integrity
      - STRESS_WEIGHT_FOC_TRANSFER=2 # ERC-20 USDFC transfer (client → deployer)
      - STRESS_WEIGHT_FOC_SETTLE=2 # settle active payment rail
      - STRESS_WEIGHT_FOC_WITHDRAW=2 # withdraw USDFC from FilecoinPay
      #
      # DESTRUCTIVE: weight 0 = disabled by default, set >0 to opt-in
      - STRESS_WEIGHT_FOC_DELETE_PIECE=1 # schedule piece deletion from proofset
      - STRESS_WEIGHT_FOC_DELETE_DS=0 # delete entire dataset + reset lifecycle
      #
      # ADVERSARIAL: economic security + griefing probes
      - STRESS_WEIGHT_PDP_GRIEFING=4 # fee extraction, insolvency, replay, burst attacks
      #
      - CURIO_PDP_URL=http://curio:80

      - STRESS_DEBUG=1
      # Protocol fuzzer config (weights for when FUZZER_ENABLED=1)
      - FUZZER_RATE_MS=500
      - FUZZER_DEBUG=1
      - FUZZER_IDENTITY_POOL_SIZE=20
      - FUZZER_WEIGHT_CBOR_DECODER_STRESS=4
      - FUZZER_WEIGHT_F3_GRANITE_CONSENSUS=4
      - FUZZER_WEIGHT_F3_CHAIN_EXCHANGE=4
      - FUZZER_WEIGHT_F3_CERT_EXCHANGE=3
      - FUZZER_WEIGHT_BLOCK_AND_MESSAGE_VALIDATION=3
      - FUZZER_WEIGHT_CHAINEXCHANGE_RESPONSES=3
      - FUZZER_WEIGHT_LIBP2P_CONNECTION_ABUSE=2
    volumes:
      - ./shared/configs:/shared/configs
      - ./shared:/shared
      - ./data/lotus0:/root/devgen/lotus0
      - ./data/lotus1:/root/devgen/lotus1
      - ./data/lotus2:/root/devgen/lotus2
      - ./data/lotus3:/root/devgen/lotus3
      - ./data/forest0:/root/devgen/forest0
      - ./data/curio:/root/devgen/curio

  lotus-miner0:
    <<: [ *filecoin_service, *needs_lotus0_healthy ]
    image: lotus:${LOTUS_MINER_0_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner0
    entrypoint: [ "./scripts/start-lotus-miner.sh", "0" ]

  lotus-miner1:
    <<: [ *filecoin_service, *needs_lotus1_healthy ]
    image: lotus:${LOTUS_MINER_1_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner1
    entrypoint: [ "./scripts/start-lotus-miner.sh", "1" ]

  lotus-miner2:
    <<: [ *filecoin_service, *needs_lotus2_healthy ]
    image: lotus:${LOTUS_MINER_2_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner2
    entrypoint: [ "./scripts/start-lotus-miner.sh", "2" ]
    profiles: [ full ]

  lotus-miner3:
    <<: [ *filecoin_service, *needs_lotus3_healthy ]
    image: lotus:${LOTUS_MINER_3_TAG:-${LOTUS_TAG:-latest}}
    container_name: lotus-miner3
    entrypoint: [ "./scripts/start-lotus-miner.sh", "3" ]
    profiles: [ full ]

  # ===========================================================================
  # foc profile: Filecoin On-Chain Cloud services (filwizard + yugabyte + curio)
  # Start with: docker compose --profile foc up -d
  # ===========================================================================

  # FilWizard: contract deployment + environment wiring
  filwizard:
    <<: [ *filecoin_service ]
    image: filwizard:latest
    container_name: filwizard
    entrypoint: [ "/filwizard-entrypoint.sh" ]
    volumes:
      - ./shared/configs:/shared/configs
      - ./data/lotus0:/shared/lotus0
      - ./data/curio:/shared/curio
      - ./shared:/shared
      - ./filwizard/entrypoint.sh:/filwizard-entrypoint.sh
    depends_on:
      lotus0:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-f", "/tmp/healthy" ]
      interval: 5s
      timeout: 2s
      retries: 120
    profiles: [ foc ]

  # Yugabyte Database Service
  yugabyte:
    <<: [ *filecoin_service ]
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte
    init: true
    command: >
      bash -lc '
        bin/yugabyted start --base_dir=/home/yugabyte/yb_data --background=true --ui=false
        tail -F \
          /home/yugabyte/yb_data/data/yb-data/tserver/logs/yb-tserver.INFO
      '
    ports:
      - "5433:5433"
      - "9042:9042"
      - "15433:15433"
    environment:
      - TINI_SUBREAPER=true
    volumes:
      - ./data/yugabyte:/home/yugabyte/yb_data
    profiles: [ foc ]

  # Curio service
  curio:
    <<: [ *filecoin_service ]
    image: curio:${CURIO_TAG:-latest}
    container_name: curio
    ports:
      - "4433:443"
      - "8080:80"
      - "12300:12300"
      - "4701:4701"
      - "32100:32100"
    depends_on:
      lotus0:
        condition: service_healthy
      yugabyte:
        condition: service_started
      filwizard:
        condition: service_started
    profiles: [ foc ]
