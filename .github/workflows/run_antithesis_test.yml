name: Run Antithesis Test

on:
  schedule:
    - cron: '30 15 * * *'  # nightly
    - cron: '0 16 * * *'   # consensus
    - cron: '30 16 * * *'  # drand
    - cron: '0 17 * * *'   # fip
    - cron: '30 17 * * *'  # foc
  workflow_dispatch:
    inputs:
      endpoint:
        type: string
        required: true
        default: 'filecoin'
        description: Endpoint to run test (filecoin or filecoin-foc)
      setup:
        type: choice
        required: false
        default: 'nightly'
        description: 'Workload profile (selects .env for stress weights)'
        options:
          - nightly
          - consensus
          - drand
          - fip
          - foc
      duration:
        type: string
        required: true
        default: '1'
        description: Duration to the test run
      emails:
        type: string
        required: true
        description: Email receipents
      drand:
        type: string
        required: true
        default: 'latest'
        description: The drand image tag used for the test run
      forest:
        type: string
        required: true
        default: 'latest'
        description: Default forest image tag for all forest instances
      lotus:
        type: string
        required: true
        default: 'latest'
        description: Default lotus image tag for all lotus/miner instances
      curio:
        type: string
        required: true
        default: 'latest'
        description: The curio image tag used for the test run
      workload:
        type: string
        required: true
        default: 'latest'
        description: The workload image tag used for the test run
      filwizard:
        type: string
        required: true
        default: 'latest'
        description: The filwizard image tag used for the test run
      config:
        type: string
        required: true
        default: 'latest'
        description: The config image tag used for the test run
      lotus_0_tag:
        type: string
        required: false
        default: ''
        description: Override image tag for lotus0 (leave empty to use lotus default)
      lotus_1_tag:
        type: string
        required: false
        default: ''
        description: Override image tag for lotus1 (leave empty to use lotus default)
      lotus_miner_0_tag:
        type: string
        required: false
        default: ''
        description: Override image tag for lotus-miner0 (leave empty to use lotus default)
      lotus_miner_1_tag:
        type: string
        required: false
        default: ''
        description: Override image tag for lotus-miner1 (leave empty to use lotus default)
      forest_0_tag:
        type: string
        required: false
        default: ''
        description: Override image tag for forest0 (leave empty to use forest default)
      is_ephemeral:
        type: boolean
        required: false
        default: false
        description: Enable to run an ephermeral test that does not affect findings history.
      is_smoke_test:
        type: boolean
        required: false
        default: false
        description: Enable to run an smoke test.

jobs:
  manual_run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Build images list
        id: images
        run: |
          IMAGES="drand:${{ inputs.drand }};forest:${{ inputs.forest }};lotus:${{ inputs.lotus }};workload:${{ inputs.workload }};curio:${{ inputs.curio }}"
          if [ -n "${{ inputs.lotus_0_tag }}" ] && [ "${{ inputs.lotus_0_tag }}" != "${{ inputs.lotus }}" ]; then
            IMAGES="${IMAGES};lotus:${{ inputs.lotus_0_tag }}"
          fi
          if [ -n "${{ inputs.lotus_1_tag }}" ] && [ "${{ inputs.lotus_1_tag }}" != "${{ inputs.lotus }}" ]; then
            IMAGES="${IMAGES};lotus:${{ inputs.lotus_1_tag }}"
          fi
          if [ -n "${{ inputs.lotus_miner_0_tag }}" ] && [ "${{ inputs.lotus_miner_0_tag }}" != "${{ inputs.lotus }}" ]; then
            IMAGES="${IMAGES};lotus:${{ inputs.lotus_miner_0_tag }}"
          fi
          if [ -n "${{ inputs.lotus_miner_1_tag }}" ] && [ "${{ inputs.lotus_miner_1_tag }}" != "${{ inputs.lotus }}" ]; then
            IMAGES="${IMAGES};lotus:${{ inputs.lotus_miner_1_tag }}"
          fi
          if [ -n "${{ inputs.forest_0_tag }}" ] && [ "${{ inputs.forest_0_tag }}" != "${{ inputs.forest }}" ]; then
            IMAGES="${IMAGES};forest:${{ inputs.forest_0_tag }}"
          fi
          echo "list=${IMAGES}" >> "$GITHUB_OUTPUT"
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: ${{ inputs.endpoint }}
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: ${{ steps.images.outputs.list }}
          config_image: config:${{ github.event.inputs.config }}
          description: "Manual Test"
          email_recipients: ${{ github.event.inputs.emails }}
          additional_parameters: |-
            custom.duration=${{ github.event.inputs.duration }}
            custom.setup=${{ inputs.setup }}
            antithesis.source=main-${{ inputs.setup }}
            antithesis.is_ephemeral=${{ inputs.is_ephemeral }}
            custom.is_smoke_test=${{ inputs.is_smoke_test }}
            custom.lotus_tag=${{ inputs.lotus }}
            custom.lotus_0_tag=${{ inputs.lotus_0_tag }}
            custom.lotus_1_tag=${{ inputs.lotus_1_tag }}
            custom.lotus_miner_0_tag=${{ inputs.lotus_miner_0_tag }}
            custom.lotus_miner_1_tag=${{ inputs.lotus_miner_1_tag }}
            custom.forest_tag=${{ inputs.forest }}
            custom.forest_0_tag=${{ inputs.forest_0_tag }}


  scheduled_nightly:
    name: "Nightly Profile — balanced full coverage"
    if: github.event_name == 'schedule' && github.event.schedule == '30 15 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: filecoin
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: drand:latest;forest:latest;lotus:latest;workload:latest
          config_image: config:latest
          description: "Nightly Profile: 12 hr balanced full-coverage run"
          additional_parameters: |-
            custom.duration=12
            custom.setup=nightly
            antithesis.source=main-nightly
            antithesis.integrations.slack.callback_url=https://hooks.slack.com/services/TEHTVS1L6/B0984KRV33P
            antithesis.integrations.slack.token=${{ secrets.SLACK_TOKEN }}

  scheduled_consensus:
    name: "Consensus Profile — EC/F3 n-split safety"
    if: github.event_name == 'schedule' && github.event.schedule == '0 16 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: filecoin
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: drand:latest;forest:latest;lotus:latest;workload:latest
          config_image: config:latest
          description: "Consensus Profile: 12 hr EC/F3 partition safety run"
          additional_parameters: |-
            custom.duration=12
            custom.setup=consensus
            antithesis.source=main-consensus
            antithesis.integrations.slack.callback_url=https://hooks.slack.com/services/TEHTVS1L6/B0984KRV33P
            antithesis.integrations.slack.token=${{ secrets.SLACK_TOKEN }}

  scheduled_drand:
    name: "Drand Profile — beacon fault tolerance"
    if: github.event_name == 'schedule' && github.event.schedule == '30 16 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: filecoin
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: drand:latest;forest:latest;lotus:latest;workload:latest
          config_image: config:latest
          description: "Drand Profile: 8 hr beacon fault tolerance run"
          additional_parameters: |-
            custom.duration=8
            custom.setup=drand
            antithesis.source=main-drand
            antithesis.integrations.slack.callback_url=https://hooks.slack.com/services/TEHTVS1L6/B0984KRV33P
            antithesis.integrations.slack.token=${{ secrets.SLACK_TOKEN }}

  scheduled_fip:
    name: "FIP Profile — network upgrade testing"
    if: github.event_name == 'schedule' && github.event.schedule == '0 17 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: filecoin
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: drand:latest;forest:latest;lotus:latest;workload:latest
          config_image: config:latest
          description: "FIP Profile: 8 hr network upgrade migration run"
          additional_parameters: |-
            custom.duration=8
            custom.setup=fip
            antithesis.source=main-fip
            antithesis.integrations.slack.callback_url=https://hooks.slack.com/services/TEHTVS1L6/B0984KRV33P
            antithesis.integrations.slack.token=${{ secrets.SLACK_TOKEN }}

  scheduled_foc:
    name: "FOC Profile — Curio PDP lifecycle"
    if: github.event_name == 'schedule' && github.event.schedule == '30 17 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: antithesishq/antithesis-trigger-action@main
        with:
          notebook_name: filecoin-foc
          tenant: cobalt-bunny
          username: filecoin
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          images: drand:latest;forest:latest;lotus:latest;workload:latest;curio:latest;filwizard:latest
          config_image: config:latest
          description: "FOC Profile: 12 hr Curio PDP lifecycle run"
          additional_parameters: |-
            custom.duration=12
            custom.setup=foc
            antithesis.source=main-foc
            antithesis.integrations.slack.callback_url=https://hooks.slack.com/services/TEHTVS1L6/B0984KRV33P
            antithesis.integrations.slack.token=${{ secrets.SLACK_TOKEN }}
