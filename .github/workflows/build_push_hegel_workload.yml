name: Build & Push Hegel Workload

on:
  schedule:
    # 6 PM EST daily
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      workload_tag:
        type: string
        required: true
        default: 'latest'
        description: A hegel workload tag

jobs:
  antithesis:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Antithesis Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.ANTITHESIS_GAR_KEY }}

    - name: Extract metadata (tags) for Docker hegel-workload
      id: meta-workload
      uses: docker/metadata-action@v5
      with:
        images: us-central1-docker.pkg.dev/molten-verve-216720/filecoin-repository/hegel-workload
        tags: |
          type=sha
          ${{ github.event.inputs.workload_tag }}
    - name: Build and push hegel-workload
      uses: docker/build-push-action@v5
      with:
        context: ./hegel-workload
        file: ./hegel-workload/Dockerfile
        push: true
        tags: ${{ steps.meta-workload.outputs.tags }}, ${{ env.GITHUB_REF_NAME }}
        labels: ${{ steps.meta-workload.outputs.labels }}
